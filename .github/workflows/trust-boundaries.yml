name: Trust Boundaries

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile boundary checker
        run: python -m py_compile tools/check_boundaries.py

      - name: Enforce trust domains and governance controls
        run: python tools/check_boundaries.py
